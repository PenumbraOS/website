<header class="site-header">
  <div class="header-inner">
    <a href="/" class="site-logo">
      <img class="logo-icon" src="/img/logo.png" width="28" height="28" alt="" aria-hidden="true">
      <span>PenumbraOS</span>
    </a>
    <nav class="site-nav">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL }}" class="nav-link{{ if $.IsMenuCurrent "main" . }} active{{ end }}">{{ .Name }}</a>
      {{ end }}
      <a href="https://github.com/PenumbraOS/" class="nav-link nav-link--github" target="_blank" rel="noopener" aria-label="GitHub">{{ partial "icons/github.html" }}</a>
    </nav>
  </div>
</header>
