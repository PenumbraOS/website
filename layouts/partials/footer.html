<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-info">
      {{ with .Site.Params.footer.note }}
      <p class="footer-note">{{ . }}</p>
      {{ end }}
    </div>
    {{ with .Site.Params.footer.links }}
    <div class="footer-links">
      {{ range . }}
      <a href="{{ .url }}" class="footer-link" target="_blank" rel="noopener">{{ .name }}</a>
      {{ end }}
    </div>
    {{ end }}
  </div>
</footer>
